name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GAR_LOCATION: us-central1
  GAR_REPO: config-system
  GKE_CLUSTER: config-system
  GKE_REGION: us-east1

jobs:
  test:
    name: Test (Docker build smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - run: docker build -t smoke-dummy-app:ci .

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet
      - name: Build and push
        id: meta
        env:
          REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}
        run: |
          docker build -t "$REGISTRY/dummy-app:${{ github.sha }}" -t "$REGISTRY/dummy-app:latest" .
          docker push "$REGISTRY/dummy-app:${{ github.sha }}"
          docker push "$REGISTRY/dummy-app:latest"
          echo "image=$REGISTRY/dummy-app:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy · Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: needs.build-push.result == 'success' && github.ref == 'refs/heads/dev'
    environment: staging
    env:
      K8S_NAMESPACE: config-system-staging
      REPLICAS: "1"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout infra manifests
        uses: actions/checkout@v4
        with:
          repository: NYCU-CloudNative26-ConfigSystem/config_system
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.ref_name }}
          path: infra
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin
      - run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          export IMAGE_DUMMY_APP="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPO}/dummy-app:${GITHUB_SHA}"
          envsubst '${IMAGE_DUMMY_APP}${K8S_NAMESPACE}${REPLICAS}' < infra/k8s/services/dummy-app.yaml | kubectl apply -f -
          kubectl rollout status deployment/dummy-app -n "${K8S_NAMESPACE}" --timeout=300s

  deploy-production:
    name: Deploy · Production
    runs-on: ubuntu-latest
    needs: build-push
    if: needs.build-push.result == 'success' && github.ref == 'refs/heads/main'
    environment: production
    env:
      K8S_NAMESPACE: config-system
      REPLICAS: "1"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout infra manifests
        uses: actions/checkout@v4
        with:
          repository: NYCU-CloudNative26-ConfigSystem/config_system
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.ref_name }}
          path: infra
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin
      - run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          export IMAGE_DUMMY_APP="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPO}/dummy-app:${GITHUB_SHA}"
          envsubst '${IMAGE_DUMMY_APP}${K8S_NAMESPACE}${REPLICAS}' < infra/k8s/services/dummy-app.yaml | kubectl apply -f -
          kubectl rollout status deployment/dummy-app -n "${K8S_NAMESPACE}" --timeout=300s
